services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propnest_backend
    ports:
      - "8000:8000"
    environment:
      - ENV=${ENV:-dev}
    volumes:
      - .:/app
    depends_on:
      - db
      - minio
    networks:
      propnest_network:
        aliases:
          - propnest.backend.api

  db:
    image: postgres:16-alpine
    container_name: propnest_db
    environment:
      POSTGRES_USER: propnest
      POSTGRES_PASSWORD: propnest_secret
      POSTGRES_DB: propnest_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      propnest_network:
        aliases:
          - propnest.backend.postgres

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: propnest_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: propnest_minio
      MINIO_ROOT_PASSWORD: propnest_secret
      MINIO_VOLUMES: "/data"
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      propnest_network:
        aliases:
          - propnest.backend.minio

networks:
  propnest_network:
    driver: bridge

volumes:
  pgdata:
  miniodata:
